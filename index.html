<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GD | DaniezOnSFUSD</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
        .game-container {
            text-align: center;
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
            max-width: 500px;
            width: 90%;
        }
        h1 {
            color: #00e676;
            margin-bottom: 15px;
        }
        p {
            color: #b0b0b0;
            margin-bottom: 30px;
        }
        .play-btn {
            background-color: #ff3d00;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            display: inline-block;
            transition: background-color 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 10px rgba(255, 61, 0, 0.4);
        }
        .play-btn:hover {
            background-color: #d50000;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>Dashmetry</h1>
        <p>Sync your jumps to the beat and dodge treacherous obstacles in this fast-paced rhythm platformer!</p>
        <a href="https://dashmetry.com/" class="play-btn" target="_blank" rel="noopener noreferrer">Play Game Now</a>
    </div>

</body>
</html>
